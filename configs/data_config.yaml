# data_config.yaml
# Controls data ingestion from Yahoo Finance for DAX and EURO STOXX 50 indices.

assets:
  - ticker: "^GDAXI"
    label: "DAX"
    full_name: "DAX Performance Index"
    exchange: "XETRA"
    currency: "EUR"
    source: "yfinance"

  - ticker: "^STOXX50E"
    label: "STOXX50"
    full_name: "EURO STOXX 50 Index"
    exchange: "Euronext / Multiple"
    currency: "EUR"
    source: "yfinance"

date_range:
  start: "2010-01-01"             # PLACEHOLDER — adjust to your study window
  end: "2024-12-31"               # PLACEHOLDER — adjust as needed
  # TODO: Ensure start date captures at least 3–5 years of training data

frequency:
  target: "1D"                    # Daily bars from Yahoo Finance (adjusted close)
  # NOTE: Yahoo Finance provides daily OHLCV for index tickers
  # Intraday data is NOT available for indices on free Yahoo Finance API

columns:
  # Yahoo Finance standard column names (returned by yf.download)
  datetime: "Date"
  open: "Open"
  high: "High"
  low: "Low"
  close: "Adj Close"             # Use Adj Close for indices (splits/div adjusted)
  volume: "Volume"               # Volume is typically not meaningful for indices
  # NOTE: For ^GDAXI and ^STOXX50E, volume = 0 or NaN — treat as unavailable

timezone:
  output: "UTC"

splits:
  # Strict temporal separation — no shuffling, no overlap
  train_start: "2010-01-01"      # PLACEHOLDER
  train_end: "2019-12-31"        # PLACEHOLDER
  val_start: "2020-01-01"        # PLACEHOLDER
  val_end: "2021-12-31"          # PLACEHOLDER
  test_start: "2022-01-01"       # PLACEHOLDER
  test_end: "2024-12-31"         # PLACEHOLDER
  # TODO: Adjust splits so each split has a meaningful number of trading days
  # Recommended: train ≥ 5 years, val ≥ 1 year, test ≥ 1 year

data_cache:
  enabled: true
  path: "data/raw/"              # Downloaded files saved as Parquet for reuse
